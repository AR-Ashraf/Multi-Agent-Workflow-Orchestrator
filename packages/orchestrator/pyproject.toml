[project]
name = "cadenza-orchestrator"
version = "0.0.0"
description = "Cadenza LangGraph orchestration engine — the multi-agent graph, agents, and tools."
requires-python = ">=3.12,<3.13"
dependencies = [
  "langgraph>=1.0,<2.0",
  "pydantic>=2.7",
  "httpx>=0.27",
]

[dependency-groups]
dev = [
  "pytest>=8.3",
  "jsonschema>=4.23",
  "ruff>=0.7",
  "black>=24.10",
  "pyright>=1.1.390",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cadenza_orchestrator"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# Black owns line length; long unbreakable strings (log copy, URLs) shouldn't fail lint.
ignore = ["E501"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.pyright]
include = ["src", "tests"]
typeCheckingMode = "standard"
pythonVersion = "3.12"
